name: 🔥 Daily Streak Counter

on:
  schedule:
    - cron: '15 1 * * *'   # 6:45 AM IST
    - cron: '45 6 * * *'   # 12:15 PM IST
    - cron: '20 10 * * *'  # 3:50 PM IST
    - cron: '50 15 * * *'  # 9:20 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write update script
        run: |
          cat > /tmp/update.py << 'EOF'
          import json
          from datetime import datetime, timezone
          now = datetime.now(timezone.utc)
          try:
              with open('stats.json', 'r') as f:
                  data = json.load(f)
          except FileNotFoundError:
              data = {'total_commits': 0, 'started': now.strftime('%Y-%m-%d')}
          data['total_commits'] = data.get('total_commits', 0) + 1
          data['last_commit'] = now.strftime('%Y-%m-%d %H:%M:%S UTC')
          with open('stats.json', 'w') as f:
              json.dump(data, f, indent=2)
          with open('activity.log', 'a') as f:
              f.write(f"{now.strftime('%Y-%m-%d %H:%M:%S')} UTC — commit #{data['total_commits']}\n")
          EOF

      - name: Make random commits
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Random number of commits: 4 to 8 per session
          NUM=$(python3 -c "import random; print(random.randint(4, 8))")
          echo "🎲 Making $NUM commits this session..."

          MSGS=(
            "⚡ daily grind"
            "🔥 stay consistent"
            "💡 learning daily"
            "🚀 building daily"
            "🧠 stacking habits"
            "📈 small progress"
            "💪 day by day"
            "🎯 staying focused"
            "✨ building momentum"
            "🌱 growing daily"
            "🔧 keep shipping"
            "📚 never stop learning"
          )

          for i in $(seq 1 $NUM); do
            python3 /tmp/update.py
            IDX=$((RANDOM % ${#MSGS[@]}))
            MSG="${MSGS[$IDX]}"
            git add stats.json activity.log
            git commit -m "$MSG — $(date -u '+%H:%M:%S')"
            sleep 2
          done

          git push
